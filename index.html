<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naruto Impact HD - Ultimate Comparison Tool</title>
    
    <script defer src="https://unpkg.com/img-comparison-slider@7/dist/index.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/img-comparison-slider@7/dist/styles.css" />

    <style>
        :root {
            --naruto-orange: #ff9000;
            --dark-bg: #0b0b0b;
            --card-bg: #161616;
            --text-gray: #aaa;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--dark-bg); 
            color: white; 
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { max-width: 1100px; width: 100%; text-align: center; }

        header { padding: 20px 0; margin-bottom: 20px; border-bottom: 1px solid #333; }
        h1 { color: var(--naruto-orange); margin: 0; font-size: 1.8rem; text-transform: uppercase; }
        
        /* Menu de Categorias */
        .category-menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 30px;
        }

        .btn-cat {
            background: #222;
            border: 2px solid #444;
            color: white;
            padding: 12px;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .btn-cat.active {
            border-color: var(--naruto-orange);
            background: var(--naruto-orange);
            color: black;
        }

        /* Seletor de Imagens (0-11) */
        .image-selector {
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        .btn-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid #555;
            background: #333;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-img.active {
            background: white;
            color: black;
            border-color: white;
        }

        /* Área do Slider */
        .comparison-area {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
        }

        img-comparison-slider {
            width: 100%;
            --divider-color: var(--naruto-orange);
            --default-handle-color: var(--naruto-orange);
            border-radius: 10px;
            outline: none;
        }

        img-comparison-slider img {
            width: 100%;
            max-height: 70vh;
            object-fit: contain;
            display: block;
        }

        .info-panel {
            margin-top: 20px;
            background: rgba(255,144,0,0.1);
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed var(--naruto-orange);
        }

        .label-box {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            font-weight: bold;
            color: var(--naruto-orange);
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        footer { margin-top: 50px; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Naruto Impact HD - Comparison Hub</h1>
            <p style="color: var(--text-gray)">Selecione uma categoria e navegue pelos frames para comparar as texturas.</p>
        </header>

        <div class="category-menu">
            <button class="btn-cat active" onclick="setCategory('psp_vs_png', this)">PSP vs PNG Normal</button>
            <button class="btn-cat" onclick="setCategory('png_vs_color', this)">PNG Normal vs Vibrant</button>
            <button class="btn-cat" onclick="setCategory('png_vs_ktx2', this)">PNG vs KTX2 Normal</button>
            <button class="btn-cat" onclick="setCategory('color_vs_ktx2color', this)">Vibrant vs KTX2 Vibrant</button>
        </div>

        <div class="image-selector" id="imgSelector">
            </div>

        <div class="comparison-area">
            <div class="label-box">
                <span id="label-left">Original / Base</span>
                <span id="label-right">HD / Processed</span>
            </div>
            
            <img-comparison-slider id="slider">
                <img slot="first" id="img-before" src="" />
                <img slot="second" id="img-after" src="" />
            </img-comparison-slider>
        </div>

        <div class="info-panel">
            <p id="comp-description">Mostrando comparação entre as texturas originais do PSP e o upscale PNG 4x.</p>
        </div>

        <footer>
            Desenvolvido por MESKH4H4 | Naruto Shippuden Ultimate Ninja Impact HD Project
        </footer>
    </div>

    <script>
        const baseUrl = "https://meskh4h4.github.io/naruto-shippuden-ultimate-ninja-impact/comparacoes";
        
        let currentCategory = 'psp_vs_png';
        let currentIndex = 0;

        // Configuração das pastas e prefixos baseada no seu sistema
        const configs = {
            'psp_vs_png': {
                leftDir: 'PSP/psp-4x',
                rightDir: 'PNG-NORMAL/png-normal',
                desc: 'Comparação: Textura Original PSP (Upscaled) vs Reconstrução PNG Normal.',
                labelL: 'PSP Original',
                labelR: 'PNG HD Normal'
            },
            'png_vs_color': {
                leftDir: 'PNG-NORMAL/png-normal',
                rightDir: 'PNG-VIBRANTCOLOR/png-Color',
                desc: 'Comparação: PNG Normal vs Versão Vibrant Colors (AdobeRGB -> sRGB).',
                labelL: 'PNG Normal',
                labelR: 'Vibrant Colors'
            },
            'png_vs_ktx2': {
                leftDir: 'PNG-NORMAL/png-normal',
                rightDir: 'KTX2/ktx2-normal',
                desc: 'Comparação: Fidelidade PNG vs Performance KTX2 (Normal).',
                labelL: 'PNG (Lossless)',
                labelR: 'KTX2 (Optimized)'
            },
            'color_vs_ktx2color': {
                leftDir: 'PNG-VIBRANTCOLOR/png-Color',
                rightDir: 'KTX2-VIBRANTCOLOR/ktx2-color',
                desc: 'Comparação: Fidelidade PNG vs Performance KTX2 (Vibrant Colors).',
                labelL: 'PNG Vibrant',
                labelR: 'KTX2 Vibrant'
            }
        };

        function initSelector() {
            const selector = document.getElementById('imgSelector');
            for (let i = 0; i <= 11; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                btn.className = 'btn-img' + (i === 0 ? ' active' : '');
                btn.onclick = () => setIndex(i, btn);
                selector.appendChild(btn);
            }
        }

        function setCategory(cat, btn) {
            currentCategory = cat;
            
            // Atualizar botões
            document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            updateImages();
        }

        function setIndex(idx, btn) {
            currentIndex = idx;
            
            // Atualizar botões
            document.querySelectorAll('.btn-img').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            updateImages();
        }

        function updateImages() {
            const config = configs[currentCategory];
            const imgBefore = document.getElementById('img-before');
            const imgAfter = document.getElementById('img-after');
            
            // Gerar caminhos completos
            const pathBefore = `${baseUrl}/${config.leftDir}-${currentIndex}.png`;
            const pathAfter = `${baseUrl}/${config.rightDir}-${currentIndex}.png`;

            // Aplicar no HTML
            imgBefore.src = pathBefore;
            imgAfter.src = pathAfter;

            // Atualizar Textos
            document.getElementById('comp-description').innerText = config.desc;
            document.getElementById('label-left').innerText = config.labelL;
            document.getElementById('label-right').innerText = config.labelR;
        }

        // Iniciar site
        initSelector();
        updateImages();
    </script>
</body>
</html>
